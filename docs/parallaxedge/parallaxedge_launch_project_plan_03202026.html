
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-sans, sans-serif); }
.wrap { padding: 1.5rem 1rem 2rem; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; font-size: 12px; color: var(--color-text-secondary); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.phase-block { margin-bottom: 1.5rem; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.phase-header { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; cursor: pointer; user-select: none; }
.phase-header:hover { background: var(--color-background-secondary); }
.phase-color { width: 4px; min-width: 4px; border-radius: 2px; align-self: stretch; min-height: 32px; }
.phase-title-group { flex: 1; }
.phase-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 2px; }
.phase-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.phase-date { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.phase-kpi { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; font-style: italic; }
.chevron { font-size: 14px; color: var(--color-text-secondary); transition: transform 0.2s; margin-top: 2px; }
.chevron.open { transform: rotate(90deg); }
.tasks-container { border-top: 0.5px solid var(--color-border-tertiary); overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
.tasks-container.open { max-height: 2000px; }
.task { display: grid; grid-template-columns: 18px 1fr auto; gap: 8px; align-items: start; padding: 9px 16px 9px 22px; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
.task:last-child { border-bottom: none; }
.task-icon { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.task-body { color: var(--color-text-primary); }
.task-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.task-owner { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; padding-top: 1px; }
.blocker { background: #FCEBEB; color: #A32D2D; border-left: 3px solid #E24B4A; padding: 8px 16px 8px 12px; margin: 0; font-size: 12px; }
.badge { display: inline-block; font-size: 10px; font-weight: 500; border-radius: 4px; padding: 2px 6px; margin-left: 6px; vertical-align: middle; }
.badge-crit { background: #FCEBEB; color: #A32D2D; }
.badge-high { background: #FAEEDA; color: #854F0B; }
.badge-ok   { background: #EAF3DE; color: #3B6D11; }

/* status icons */
.icon-blocker { background: #FCEBEB; color: #A32D2D; border: 1px solid #F09595; }
.icon-open    { background: #FAEEDA; color: #854F0B; border: 1px solid #FAC775; }
.icon-done    { background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; }
.icon-mkt     { background: #E6F1FB; color: #185FA5; border: 1px solid #85B7EB; }
.icon-legal   { background: #EEEDFE; color: #534AB7; border: 1px solid #AFA9EC; }
.icon-launch  { background: #E1F5EE; color: #0F6E56; border: 1px solid #5DCAA5; }

/* phase bar colors */
.bar-gray   { background: #888780; }
.bar-amber  { background: #BA7517; }
.bar-blue   { background: #185FA5; }
.bar-purple { background: #534AB7; }
.bar-teal   { background: #0F6E56; }
.bar-coral  { background: #993C1D; }

.timeline-strip { display: flex; gap: 0; margin-bottom: 1.5rem; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.ts-month { flex: 1; text-align: center; font-size: 10px; font-weight: 500; color: var(--color-text-secondary); padding: 5px 2px; border-right: 0.5px solid var(--color-border-tertiary); }
.ts-month:last-child { border-right: none; }
.ts-month.current { background: var(--color-background-secondary); color: var(--color-text-primary); }
</style>

function togglePhase(idx) {
  const tasks = document.getElementById('tasks-' + idx);
  const chev = document.getElementById('chev-' + idx);
  tasks.classList.toggle('open');
  chev.classList.toggle('open');
}

function badgeHtml(badge) {
  const cls = badge === 'CRIT' ? 'badge-crit' : badge === 'DONE' || badge === 'GO' ? 'badge-ok' : 'badge-high';
  return `<span class="badge ${cls}">${badge}</span>`;
}

const container = document.getElementById('phases');
phases.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'phase-block';
  const taskRows = p.tasks.map(t =>
    `<div class="task">
      <div class="task-icon ${t.icon}">${t.icon.includes('legal') ? '⚖' : t.icon.includes('mkt') ? '▶' : t.icon.includes('launch') ? '★' : t.icon.includes('done') ? '✓' : t.icon.includes('blocker') ? '!' : '○'}</div>
      <div class="task-body">${t.text}${badgeHtml(t.badge)}<div class="task-sub">${t.sub}</div></div>
      <div class="task-owner">${t.owner}</div>
    </div>`
  ).join('');

  el.innerHTML = `
    <div class="phase-header" onclick="togglePhase(${i})">
      <div class="phase-color ${p.color}"></div>
      <div class="phase-title-group">
        <div class="phase-label">${p.label}</div>
        <div class="phase-name">${p.name}</div>
        <div class="phase-date">${p.date}</div>
        <div class="phase-kpi">Target: ${p.kpi}</div>

      <div class="chevron" id="chev-${i}">›</div>
    </div>
    <div class="tasks-container" id="tasks-${i}">
      ${taskRows}
    </div>
  `;
  container.appendChild(el);
});
